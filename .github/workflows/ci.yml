name: PR Quality Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff and codespell
        run: pip install ruff==0.15.2 codespell

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: codespell
        run: codespell backtest/ live/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: mypy type check
        run: mypy backtest/ live/ --config-file=pyproject.toml

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest backtest/tests/ live/tests/ -v \
            --cov=backtest --cov=live --cov-fail-under=70 --cov-report=term-missing

  shell-tests:
    name: Shell Tests (lib_retry.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run lib_retry.sh tests
        run: bash tests/test_lib_retry.sh

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Bandit SAST scan
        run: bandit -c pyproject.toml -r backtest/ live/

      - name: pip-audit dependency scan
        # Known-accepted vulnerabilities — track each via a follow-up upgrade
        # ticket and remove from this list once addressed.
        # pillow:    used only by mplfinance/matplotlib for chart rendering
        # pygments:  used in docs only
        # pytest:    dev tool, /tmp permission DoS only
        # pip:       dev/CI bootstrap tool
        # python-dotenv: only set_key()/unset_key() are vulnerable; we don't call them
        # requests:  only extract_zipped_paths() is vulnerable; we don't call it
        run: |
          pip-audit --desc on \
            --ignore-vuln CVE-2026-40192 \
            --ignore-vuln CVE-2026-42308 \
            --ignore-vuln CVE-2026-42309 \
            --ignore-vuln CVE-2026-42310 \
            --ignore-vuln CVE-2026-42311 \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2026-6357 \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln CVE-2026-28684 \
            --ignore-vuln CVE-2026-25645

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: vulture (dead code detection)
        continue-on-error: true
        run: vulture backtest/ live/ --min-confidence 80

      - name: deptry (unused dependency detection)
        continue-on-error: true
        run: deptry .
